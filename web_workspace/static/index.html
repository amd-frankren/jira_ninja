<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jira Ninja Workspace</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #111827;
        --panel-2: #0f172a;
        --line: #243244;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #3b82f6;
        --ok: #16a34a;
        --err: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        background: radial-gradient(circle at 20% 10%, #18213f, #0a0f1e 45%, #070b16);
        color: var(--text);
      }

      .layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        background: rgba(15, 23, 42, 0.95);
        border-right: 1px solid var(--line);
        padding: 18px 14px;
      }

      .brand {
        font-weight: 800;
        font-size: 16px;
        margin-bottom: 14px;
      }

      .brand-sub {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 18px;
      }

      .nav-btn {
        width: 100%;
        border: 1px solid #1f2c40;
        background: #0f172a;
        color: #dbe6f3;
        border-radius: 10px;
        text-align: left;
        padding: 10px 12px;
        cursor: pointer;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .nav-btn.active {
        border-color: #3b82f6;
        background: #122546;
      }

      .content {
        padding: 22px;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .card {
        background: rgba(17, 24, 39, 0.94);
        border: 1px solid #1f2937;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      }

      .card-header {
        padding: 14px 16px;
        border-bottom: 1px solid #1f2937;
      }

      .title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      #chat {
        height: 58vh;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

      .msg {
        padding: 10px 12px;
        border-radius: 10px;
        white-space: pre-wrap;
        line-height: 1.45;
        word-break: break-word;
      }

      .msg.user {
        align-self: flex-end;
        max-width: 78%;
        background: #2563eb;
      }

      .msg.assistant {
        align-self: flex-start;
        max-width: 88%;
        background: #374151;
      }

      .msg.status {
        align-self: flex-start;
        max-width: 92%;
        background: #4b5563;
        font-size: 13px;
      }

      .msg.tool {
        max-width: 96%;
        background: #1f2937;
        border-left: 3px solid #6366f1;
        font-size: 13px;
      }

      .msg.error {
        background: #450a0a;
        border-left: 3px solid var(--err);
      }

      .composer {
        border-top: 1px solid #1f2937;
        display: flex;
        gap: 10px;
        padding: 12px;
      }

      input,
      textarea,
      select {
        width: 100%;
        background: #0b1222;
        color: var(--text);
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        cursor: pointer;
        padding: 10px 14px;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-success {
        background: var(--ok);
        color: #fff;
      }

      .btn-danger {
        background: #334155;
        border-color: #475569;
        color: #cbd5e1;
      }

      .btn-muted {
        background: #1f2937;
        border-color: #334155;
        color: #dbe6f3;
      }

      .btn-sm {
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .result-box {
        background: #0f172a;
        border: 1px solid #2a3a52;
        border-radius: 10px;
        padding: 12px;
      }

      .knowledge-list {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .knowledge-item {
        background: #0f172a;
        border: 1px solid #28374e;
        border-radius: 10px;
        padding: 12px;
      }

      .knowledge-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .knowledge-meta {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }

      .modal.hidden {
        display: none;
      }

      .modal-panel {
        width: min(720px, 92vw);
        max-height: 86vh;
        overflow-y: auto;
        background: #0f172a;
        border: 1px solid #2a3a52;
        border-radius: 14px;
        padding: 14px;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 10px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">Jira Ninja Workspace</div>
        <button class="nav-btn active" data-page="qaPage">Ticket Q&A</button>
        <button class="nav-btn" data-page="classifyPage">Competency Selector</button>
        <button class="nav-btn" data-page="knowledgePage">AI Knowledge Hub</button>
      </aside>

      <main class="content">
        <section id="qaPage" class="page active">
          <div class="card">
            <div class="card-header">
              <h1 class="title">Ticket Q&A</h1>
              <div class="subtitle">通过 MCP Servers（jira_external / jira_internal）实时检索并回答</div>
            </div>
            <div id="chat"></div>
            <div class="composer">
              <input id="qaInput" placeholder="输入问题，例如：帮我看一下 SCET-123 的状态和最近评论" />
              <button id="qaSendBtn" class="btn-success">发送</button>
            </div>
          </div>
        </section>

        <section id="classifyPage" class="page">
          <div class="card">
            <div class="card-header">
              <h1 class="title">Competency Selector</h1>
            </div>
            <div style="padding: 14px">
              <div class="stack">
                <textarea id="classifyText" placeholder="粘贴 ticket 描述、根因分析、日志结论等"></textarea>
                <div class="actions">
                  <button id="classifyBtn" class="btn-primary">执行自动分类</button>
                </div>
                <div id="classifyResult" class="result-box hint">等待输入并执行分类...</div>
              </div>
            </div>
          </div>
        </section>

        <section id="knowledgePage" class="page">
          <div class="card">
            <div class="card-header">
              <h1 class="title">AI Knowledge Hub</h1>
              <div class="subtitle">以知识列表为主，点击添加后在弹窗中填写详细内容</div>
            </div>
            <div style="padding: 14px">
              <div class="actions" style="margin-bottom: 10px">
                <button id="kAddBtn" class="btn-primary">+ 添加内容</button>
                <button id="kRefreshBtn" class="btn-muted">刷新列表</button>
              </div>
              <div id="knowledgeList" class="knowledge-list"></div>
            </div>
          </div>
        </section>

        <div id="knowledgeModal" class="modal hidden">
          <div class="modal-panel">
            <div class="modal-title" id="kModalTitle">新增内容</div>
            <div class="stack">
              <input id="kTitle" placeholder="标题（必填）" />
              <input id="kUrl" placeholder="链接 URL（可选）" />
              <textarea id="kContent" placeholder="正文内容（可选）"></textarea>
              <div class="actions">
                <button id="kSaveBtn" class="btn-primary">保存</button>
                <button id="kCancelBtn" class="btn-muted">取消</button>
              </div>
              <div id="kEditHint" class="hint">当前模式：新建</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      // -------------------- Common page switch --------------------
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".nav-btn").forEach((x) => x.classList.remove("active"));
          document.querySelectorAll(".page").forEach((x) => x.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.page).classList.add("active");
        });
      });

      // -------------------- QA page logic (kept from original) --------------------
      const chatEl = document.getElementById("chat");
      const qaInputEl = document.getElementById("qaInput");
      const qaSendBtn = document.getElementById("qaSendBtn");
      let qaSessionId = sessionStorage.getItem("jira_qa_session_id") || "";
      let qaBusy = false;

      function qaScrollBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function qaAddMsg(text, cls = "assistant") {
        const div = document.createElement("div");
        div.className = `msg ${cls}`;
        div.textContent = text;
        chatEl.appendChild(div);
        qaScrollBottom();
        return div;
      }

      function qaSetBusy(v) {
        qaBusy = v;
        qaSendBtn.disabled = v;
        qaInputEl.disabled = v;
      }

      async function qaSubmit() {
        const text = qaInputEl.value.trim();
        if (!text || qaBusy) return;
        qaAddMsg(text, "user");
        qaInputEl.value = "";
        qaSetBusy(true);
        try {
          await qaStreamChat(text);
        } catch (err) {
          qaAddMsg(`请求失败: ${err?.message || err}`, "error");
        } finally {
          qaSetBusy(false);
          qaInputEl.focus();
        }
      }

      async function qaStreamChat(message) {
        const resp = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: qaSessionId || null,
            message,
          }),
        });

        if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let currentEvent = "";
        let dataLines = [];

        const flushEvent = () => {
          if (!currentEvent) return;
          const rawData = dataLines.join("\n");
          let payload = {};
          try {
            payload = rawData ? JSON.parse(rawData) : {};
          } catch {
            payload = { raw: rawData };
          }

          switch (currentEvent) {
            case "session":
              if (payload.session_id) {
                qaSessionId = payload.session_id;
                sessionStorage.setItem("jira_qa_session_id", qaSessionId);
              }
              break;
            case "status":
              qaAddMsg(payload.message || "[status]", "status");
              break;
            case "tool_start":
              qaAddMsg(
                `[工具调用] ${payload.server}.${payload.tool}\n参数: ${JSON.stringify(payload.arguments, null, 2)}`,
                "tool"
              );
              break;
            case "tool_result":
              qaAddMsg(`[工具结果] ${payload.server}.${payload.tool}\n${payload.result || ""}`, "tool");
              break;
            case "tool_error":
              qaAddMsg(`[工具错误] ${payload.server || ""}.${payload.tool || ""}\n${payload.error || ""}`, "error");
              break;
            case "ask_user":
              qaAddMsg(`需要你补充：${payload.question || "请补充信息"}`, "assistant");
              break;
            case "final":
              qaAddMsg(payload.answer || "", "assistant");
              break;
            case "error":
              qaAddMsg(payload.message || "未知错误", "error");
              break;
          }

          currentEvent = "";
          dataLines = [];
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split(/\r?\n/);
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (line.startsWith("event:")) currentEvent = line.slice(6).trim();
            else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
            else if (line.trim() === "") flushEvent();
          }
        }
      }

      qaSendBtn.addEventListener("click", qaSubmit);
      qaInputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") qaSubmit();
      });
      qaAddMsg("欢迎使用 Jira Ticket 问答助手。请输入你的问题。", "assistant");

      // -------------------- Classification page --------------------
      const classifyBtn = document.getElementById("classifyBtn");
      const classifyTextEl = document.getElementById("classifyText");
      const classifyResultEl = document.getElementById("classifyResult");

      classifyBtn.addEventListener("click", async () => {
        const text = classifyTextEl.value.trim();
        if (!text) {
          classifyResultEl.textContent = "请先输入 ticket 描述。";
          return;
        }
        classifyBtn.disabled = true;
        classifyResultEl.textContent = "分类中...";
        try {
          const resp = await fetch("/api/ticket/classify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
          classifyResultEl.innerHTML =
            `<b>Q1:</b> ${data.q1_label || data.q1_id}<br>` +
            `<b>Q2:</b> ${data.q2_text || ""}<br><br>` +
            `<b>推理说明:</b> ${data.reasoning || "-"}`;
        } catch (err) {
          classifyResultEl.textContent = `分类失败: ${err?.message || err}`;
        } finally {
          classifyBtn.disabled = false;
        }
      });

      // -------------------- Knowledge page --------------------
      const kTitleEl = document.getElementById("kTitle");
      const kUrlEl = document.getElementById("kUrl");
      const kContentEl = document.getElementById("kContent");
      const kSaveBtn = document.getElementById("kSaveBtn");
      const kCancelBtn = document.getElementById("kCancelBtn");
      const kAddBtn = document.getElementById("kAddBtn");
      const kRefreshBtn = document.getElementById("kRefreshBtn");
      const kEditHint = document.getElementById("kEditHint");
      const kModalTitle = document.getElementById("kModalTitle");
      const knowledgeListEl = document.getElementById("knowledgeList");
      const knowledgeModalEl = document.getElementById("knowledgeModal");

      let editingId = null;

      function openKnowledgeModal() {
        knowledgeModalEl.classList.remove("hidden");
      }

      function closeKnowledgeModal() {
        knowledgeModalEl.classList.add("hidden");
      }

      function resetKnowledgeForm() {
        editingId = null;
        kTitleEl.value = "";
        kUrlEl.value = "";
        kContentEl.value = "";
        kModalTitle.textContent = "新增内容";
        kEditHint.textContent = "当前模式：新建";
      }

      function formatUpdatedAt(ts) {
        const s = String(ts || "").trim();
        if (!s) return "-";
        const m = s.match(/^(\d{4}-\d{2}-\d{2})[T\s](\d{2}:\d{2}:\d{2})/);
        if (m) return `${m[1]} ${m[2]}`;
        return s;
      }

      async function loadKnowledgeList() {
        knowledgeListEl.innerHTML = `<div class="hint">加载中...</div>`;
        try {
          const resp = await fetch("/api/knowledge");
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
          const items = Array.isArray(data.items) ? data.items : [];

          if (!items.length) {
            knowledgeListEl.innerHTML = `<div class="hint">暂无内容，点击上方“添加内容”创建。</div>`;
            return;
          }

          knowledgeListEl.innerHTML = "";
          items.forEach((item) => {
            const div = document.createElement("div");
            div.className = "knowledge-item";
            div.innerHTML = `
              <div class="knowledge-title">${item.title || ""}</div>
              <div class="knowledge-meta">updated: ${formatUpdatedAt(item.updated_at)}</div>
              <div style="margin-bottom: 6px; white-space: pre-wrap;">${item.content || ""}</div>
              ${item.url ? `<div style="margin-bottom:8px;"><a href="${item.url}" target="_blank" style="color:#93c5fd;">${item.url}</a></div>` : ""}
              <div class="actions">
                <button class="btn-muted btn-sm" data-action="edit">编辑</button>
                <button class="btn-danger btn-sm" data-action="delete">删除</button>
              </div>
            `;

            div.querySelector('[data-action="edit"]').addEventListener("click", () => {
              editingId = item.id;
              kTitleEl.value = item.title || "";
              kUrlEl.value = item.url || "";
              kContentEl.value = item.content || "";
              kModalTitle.textContent = "编辑内容";
              kEditHint.textContent = `当前模式：编辑 (${item.id})`;
              openKnowledgeModal();
            });

            div.querySelector('[data-action="delete"]').addEventListener("click", async () => {
              if (!confirm("确认删除该条知识吗？")) return;
              const resp = await fetch(`/api/knowledge/${item.id}`, { method: "DELETE" });
              const data = await resp.json();
              if (!resp.ok) {
                alert(data.detail || `删除失败 HTTP ${resp.status}`);
                return;
              }
              if (editingId === item.id) resetKnowledgeForm();
              await loadKnowledgeList();
            });

            knowledgeListEl.appendChild(div);
          });
        } catch (err) {
          knowledgeListEl.innerHTML = `<div class="hint">加载失败: ${err?.message || err}</div>`;
        }
      }

      kAddBtn.addEventListener("click", () => {
        resetKnowledgeForm();
        openKnowledgeModal();
      });

      kCancelBtn.addEventListener("click", () => {
        closeKnowledgeModal();
      });

      knowledgeModalEl.addEventListener("click", (e) => {
        if (e.target === knowledgeModalEl) {
          closeKnowledgeModal();
        }
      });

      kSaveBtn.addEventListener("click", async () => {
        const payload = {
          title: kTitleEl.value.trim(),
          url: kUrlEl.value.trim(),
          content: kContentEl.value.trim(),
        };

        if (!payload.title) {
          alert("标题不能为空");
          return;
        }

        const isEdit = !!editingId;
        const url = isEdit ? `/api/knowledge/${editingId}` : "/api/knowledge";
        const method = isEdit ? "PUT" : "POST";

        try {
          const resp = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
          closeKnowledgeModal();
          resetKnowledgeForm();
          await loadKnowledgeList();
        } catch (err) {
          alert(`保存失败: ${err?.message || err}`);
        }
      });

      kRefreshBtn.addEventListener("click", loadKnowledgeList);
      loadKnowledgeList();
    </script>
  </body>
</html>
